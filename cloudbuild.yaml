# ============================================
# VINTEDGE - Cloud Build Configuration
# CI/CD pipeline for Google Cloud
# ============================================

steps:
  # Step 1: Install dependencies
  - name: 'node:20-alpine'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        corepack enable
        corepack prepare pnpm@8.15.0 --activate
        pnpm install --frozen-lockfile

  # Step 2: Run linting
  - name: 'node:20-alpine'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        corepack enable
        pnpm lint

  # Step 3: Run tests
  - name: 'node:20-alpine'
    entrypoint: 'sh'
    args:
      - '-c'
      - |
        corepack enable
        pnpm test

  # Step 4: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/vintedge-api:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/vintedge-api:latest'
      - '-f'
      - 'apps/api/Dockerfile'
      - '.'

  # Step 5: Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/vintedge-api:$COMMIT_SHA'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/vintedge-api:latest'

  # Step 6: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'vintedge-api'
      - '--image'
      - 'gcr.io/$PROJECT_ID/vintedge-api:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'NODE_ENV=production'
      - '--add-cloudsql-instances'
      - '${_CLOUD_SQL_CONNECTION}'
      - '--service-account'
      - 'vintedge-backend@$PROJECT_ID.iam.gserviceaccount.com'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--concurrency'
      - '80'
      - '--timeout'
      - '60s'

# Substitutions (override in trigger configuration)
substitutions:
  _CLOUD_SQL_CONNECTION: 'vintedge:us-central1:vintedge-db-prod'

# Build options
options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_MEDIUM'

# Images to store in Container Registry
images:
  - 'gcr.io/$PROJECT_ID/vintedge-api:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/vintedge-api:latest'

# Timeout
timeout: '1200s'
